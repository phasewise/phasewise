<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0F1F15"/>
      <stop offset="60%"  stop-color="#1A2E22"/>
      <stop offset="100%" stop-color="#0F1F15"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#52B788" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#52B788" stop-opacity="1"/>
      <stop offset="100%" stop-color="#52B788" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#2D6A4F"/>
      <stop offset="100%" stop-color="#52B788"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#52B788" stroke-width="1">
    <line x1="0" y1="100" x2="1500" y2="100"/>
    <line x1="0" y1="200" x2="1500" y2="200"/>
    <line x1="0" y1="300" x2="1500" y2="300"/>
    <line x1="0" y1="400" x2="1500" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="900" y1="0" x2="900" y2="500"/>
    <line x1="1200" y1="0" x2="1200" y2="500"/>
  </g>

  <!-- Horizontal accent line -->
  <line x1="0" y1="250" x2="1500" y2="250" stroke="url(#lineGrad)" stroke-width="1" opacity="0.3"/>

  <!-- Left: Logo mark large -->
  <g transform="translate(100, 150)">
    <rect x="0" y="0"  width="120" height="18" rx="9"  fill="url(#barGrad)"/>
    <rect x="0" y="28" width="90"  height="18" rx="9"  fill="url(#barGrad)" opacity="0.8"/>
    <rect x="0" y="56" width="65"  height="18" rx="9"  fill="#40916C" opacity="0.7"/>
    <rect x="0" y="84" width="105" height="18" rx="9"  fill="#52B788" opacity="0.5"/>
    <rect x="0" y="112" width="75" height="18" rx="9"  fill="#2D6A4F" opacity="0.4"/>
  </g>

  <!-- Center: Wordmark + tagline -->
  <text x="750" y="220"
    font-family="'Outfit','Helvetica Neue',Arial,sans-serif"
    font-weight="600" font-size="88" letter-spacing="-3"
    fill="#FFFFFF" text-anchor="middle">phase<tspan fill="#52B788" font-weight="300">wise</tspan></text>

  <text x="750" y="268"
    font-family="'Outfit','Helvetica Neue',Arial,sans-serif"
    font-weight="300" font-size="18" letter-spacing="6"
    fill="rgba(255,255,255,0.45)" text-anchor="middle">PROJECT MANAGEMENT FOR LANDSCAPE ARCHITECTS</text>

  <!-- Bottom accent bar -->
  <rect x="625" y="308" width="250" height="2" rx="1" fill="url(#barGrad)" opacity="0.6"/>

  <!-- Right: Decorative phase diagram -->
  <g transform="translate(1180, 155)" opacity="0.6">
    <text x="0" y="18" font-family="'Outfit',Arial,sans-serif" font-size="10" font-weight="500"
      letter-spacing="2" fill="rgba(255,255,255,0.3)">PHASES</text>
    <!-- Phase bars with labels -->
    <g transform="translate(0, 30)">
      <rect x="0" y="0"  width="200" height="12" rx="6" fill="#52B788"/>
      <text x="208" y="10" font-family="'Outfit',Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">SD · 100%</text>

      <rect x="0" y="22" width="148" height="12" rx="6" fill="#40916C"/>
      <text x="208" y="32" font-family="'Outfit',Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">DD · 74%</text>

      <rect x="0" y="44" width="84"  height="12" rx="6" fill="#2D6A4F"/>
      <text x="208" y="54" font-family="'Outfit',Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">CDs · 42%</text>

      <rect x="0" y="66" width="20"  height="12" rx="6" fill="#1A3D2B"/>
      <text x="208" y="76" font-family="'Outfit',Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.3)">CA · 0%</text>

      <rect x="0" y="88" width="200" height="12" rx="6" fill="rgba(82,183,136,0.15)"/>
      <text x="208" y="98" font-family="'Outfit',Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.2)">Bid · —</text>
    </g>
    <!-- Budget indicator -->
    <g transform="translate(0, 160)">
      <text x="0" y="0" font-family="'Outfit',Arial,sans-serif" font-size="10" font-weight="500"
        letter-spacing="2" fill="rgba(255,255,255,0.3)">BUDGET</text>
      <rect x="0" y="12" width="200" height="6" rx="3" fill="rgba(255,255,255,0.08)"/>
      <rect x="0" y="12" width="144" height="6" rx="3" fill="#C9A87C"/>
      <text x="148" y="22" font-family="'Outfit',Arial,sans-serif" font-size="10" fill="#C9A87C">72%</text>
    </g>
  </g>

  <!-- phasewise.io -->
  <text x="750" y="460"
    font-family="'Outfit','Helvetica Neue',Arial,sans-serif"
    font-weight="400" font-size="14" letter-spacing="1"
    fill="rgba(255,255,255,0.25)" text-anchor="middle">phasewise.io</text>
</svg>
