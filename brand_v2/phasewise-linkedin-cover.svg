<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#F7F9F7"/>
      <stop offset="100%" stop-color="#EBF2EC"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#2D6A4F"/>
      <stop offset="100%" stop-color="#52B788"/>
    </linearGradient>
  </defs>

  <!-- Light background - professional, clean -->
  <rect width="1584" height="396" fill="url(#bg2)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1584" height="4" fill="url(#accent2)"/>

  <!-- Left green panel -->
  <rect x="0" y="4" width="480" height="392" fill="#1A2E22"/>

  <!-- Left panel content -->
  <!-- Large phase mark -->
  <g transform="translate(60, 80)">
    <rect x="0" y="0"  width="200" height="14" rx="7" fill="#52B788"/>
    <rect x="0" y="24" width="148" height="14" rx="7" fill="#40916C"/>
    <rect x="0" y="48" width="104" height="14" rx="7" fill="#2D6A4F"/>
    <rect x="0" y="72" width="168" height="14" rx="7" fill="#52B788" opacity="0.4"/>
  </g>

  <!-- Wordmark on dark -->
  <text x="60" y="250"
    font-family="'Outfit','Helvetica Neue',Arial,sans-serif"
    font-weight="600" font-size="52" letter-spacing="-1.5"
    fill="#FFFFFF">phase<tspan fill="#52B788" font-weight="300">wise</tspan></text>

  <text x="60" y="278"
    font-family="'Outfit','Helvetica Neue',Arial,sans-serif"
    font-weight="300" font-size="11" letter-spacing="3.5"
    fill="rgba(255,255,255,0.4)">PROJECT MANAGEMENT</text>

  <!-- Right panel content -->
  <text x="560" y="140"
    font-family="'Outfit','Helvetica Neue',Arial,sans-serif"
    font-weight="600" font-size="42" letter-spacing="-1"
    fill="#1A2E22">Built for landscape architects.</text>

  <text x="560" y="190"
    font-family="'Outfit','Helvetica Neue',Arial,sans-serif"
    font-weight="300" font-size="20"
    fill="#4A6E58">Track phases, budgets, time, and profitability.</text>

  <!-- Divider -->
  <rect x="560" y="218" width="80" height="2" rx="1" fill="#52B788"/>

  <!-- Key stats -->
  <g transform="translate(560, 250)">
    <text x="0"   y="0" font-family="'Outfit',Arial,sans-serif" font-weight="600" font-size="36" fill="#2D6A4F">7</text>
    <text x="0"   y="22" font-family="'Outfit',Arial,sans-serif" font-weight="300" font-size="12" letter-spacing="1" fill="#7A9E8A">CA PHASES</text>

    <text x="120" y="0" font-family="'Outfit',Arial,sans-serif" font-weight="600" font-size="36" fill="#2D6A4F">100%</text>
    <text x="120" y="22" font-family="'Outfit',Arial,sans-serif" font-weight="300" font-size="12" letter-spacing="1" fill="#7A9E8A">PHASE VISIBILITY</text>

    <text x="320" y="0" font-family="'Outfit',Arial,sans-serif" font-weight="600" font-size="36" fill="#C9A87C">5 hrs</text>
    <text x="320" y="22" font-family="'Outfit',Arial,sans-serif" font-weight="300" font-size="12" letter-spacing="1" fill="#7A9E8A">SAVED / WEEK</text>
  </g>

  <!-- URL -->
  <text x="560" y="355"
    font-family="'Outfit',Arial,sans-serif"
    font-weight="400" font-size="13" letter-spacing="1"
    fill="rgba(26,46,34,0.3)">phasewise.io</text>
</svg>
