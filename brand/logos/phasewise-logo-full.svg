<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" fill="none">
  <!-- Phasewise Full Logo — Dark text, for light backgrounds -->

  <!-- Icon: Stacked phase bars forming a rising chart/leaf shape -->
  <g transform="translate(0, 8)">
    <!-- Phase bars — ascending, representing project phases progressing -->
    <rect x="4" y="44" width="8" height="20" rx="2" fill="#10B981" opacity="0.4"/>
    <rect x="16" y="36" width="8" height="28" rx="2" fill="#10B981" opacity="0.55"/>
    <rect x="28" y="26" width="8" height="38" rx="2" fill="#10B981" opacity="0.7"/>
    <rect x="40" y="16" width="8" height="48" rx="2" fill="#10B981" opacity="0.85"/>
    <rect x="52" y="6" width="8" height="58" rx="2" fill="#10B981"/>

    <!-- Connecting arc — suggests upward trajectory / growth -->
    <path d="M8 48 Q30 4 56 10" stroke="#10B981" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text x="76" y="52" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" font-weight="700" letter-spacing="-1" fill="#0F172A">
    Phase<tspan fill="#10B981">wise</tspan>
  </text>
</svg>
