<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Phasewise Icon — Square mark for profile pictures, favicons -->

  <!-- Background circle -->
  <rect width="64" height="64" rx="14" fill="#0F172A"/>

  <!-- Phase bars -->
  <g transform="translate(10, 6)">
    <rect x="2" y="34" width="6" height="16" rx="1.5" fill="#34D399" opacity="0.4"/>
    <rect x="12" y="27" width="6" height="23" rx="1.5" fill="#34D399" opacity="0.55"/>
    <rect x="22" y="19" width="6" height="31" rx="1.5" fill="#34D399" opacity="0.7"/>
    <rect x="32" y="11" width="6" height="39" rx="1.5" fill="#34D399" opacity="0.85"/>
    <rect x="42" y="4" width="6" height="46" rx="1.5" fill="#34D399"/>

    <!-- Growth arc -->
    <path d="M5 38 Q24 2 45 7" stroke="#34D399" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
</svg>
