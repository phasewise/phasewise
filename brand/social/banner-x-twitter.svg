<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" fill="none">
  <!-- X/Twitter Header — 1500x500 -->

  <!-- Background -->
  <rect width="1500" height="500" fill="#0F172A"/>

  <!-- Grid -->
  <defs>
    <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1500" height="500" fill="url(#grid2)"/>

  <!-- Glow -->
  <defs>
    <radialGradient id="glow2" cx="75%" cy="50%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1500" height="500" fill="url(#glow2)"/>

  <!-- Decorative phase bars — right side -->
  <g transform="translate(980, 80)">
    <rect x="0" y="220" width="36" height="100" rx="5" fill="#34D399" opacity="0.2"/>
    <rect x="55" y="175" width="36" height="145" rx="5" fill="#34D399" opacity="0.3"/>
    <rect x="110" y="125" width="36" height="195" rx="5" fill="#34D399" opacity="0.4"/>
    <rect x="165" y="80" width="36" height="240" rx="5" fill="#34D399" opacity="0.55"/>
    <rect x="220" y="35" width="36" height="285" rx="5" fill="#34D399" opacity="0.7"/>
    <rect x="275" y="0" width="36" height="320" rx="5" fill="#34D399" opacity="0.85"/>
    <path d="M18 240 Q148 10 293 18" stroke="#34D399" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Logo -->
  <g transform="translate(80, 130)">
    <g transform="translate(0, 0)">
      <rect x="0" y="100" width="14" height="45" rx="3" fill="#34D399" opacity="0.4"/>
      <rect x="22" y="80" width="14" height="65" rx="3" fill="#34D399" opacity="0.55"/>
      <rect x="44" y="58" width="14" height="87" rx="3" fill="#34D399" opacity="0.7"/>
      <rect x="66" y="36" width="14" height="109" rx="3" fill="#34D399" opacity="0.85"/>
      <rect x="88" y="14" width="14" height="131" rx="3" fill="#34D399"/>
      <path d="M7 108 Q46 8 95 20" stroke="#34D399" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    </g>

    <text x="120" y="108" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="64" font-weight="700" letter-spacing="-2" fill="#F8FAFC">
      Phase<tspan fill="#34D399">wise</tspan>
    </text>
  </g>

  <!-- Tagline -->
  <text x="80" y="340" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="400" fill="#94A3B8">
    Project management built for landscape architecture firms
  </text>

  <!-- URL -->
  <text x="80" y="380" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#34D399">
    phasewise.io
  </text>
</svg>
