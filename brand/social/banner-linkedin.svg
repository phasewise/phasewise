<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" fill="none">
  <!-- LinkedIn Company Page Banner — 1584x396 -->

  <!-- Background -->
  <rect width="1584" height="396" fill="#0F172A"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1584" height="396" fill="url(#grid)"/>

  <!-- Gradient overlay on right -->
  <defs>
    <linearGradient id="glow" x1="1200" y1="0" x2="1584" y2="396">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0.02"/>
    </linearGradient>
  </defs>
  <rect width="1584" height="396" fill="url(#glow)"/>

  <!-- Large phase bars — decorative, right side -->
  <g transform="translate(1050, 60)">
    <rect x="0" y="200" width="40" height="96" rx="6" fill="#34D399" opacity="0.2"/>
    <rect x="60" y="155" width="40" height="141" rx="6" fill="#34D399" opacity="0.3"/>
    <rect x="120" y="110" width="40" height="186" rx="6" fill="#34D399" opacity="0.4"/>
    <rect x="180" y="65" width="40" height="231" rx="6" fill="#34D399" opacity="0.55"/>
    <rect x="240" y="20" width="40" height="276" rx="6" fill="#34D399" opacity="0.7"/>
    <rect x="300" y="0" width="40" height="296" rx="6" fill="#34D399" opacity="0.85"/>

    <path d="M20 220 Q160 10 320 20" stroke="#34D399" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Logo + tagline -->
  <g transform="translate(80, 110)">
    <!-- Icon -->
    <g transform="translate(0, 0)">
      <rect x="0" y="110" width="16" height="50" rx="3" fill="#34D399" opacity="0.4"/>
      <rect x="24" y="90" width="16" height="70" rx="3" fill="#34D399" opacity="0.55"/>
      <rect x="48" y="65" width="16" height="95" rx="3" fill="#34D399" opacity="0.7"/>
      <rect x="72" y="40" width="16" height="120" rx="3" fill="#34D399" opacity="0.85"/>
      <rect x="96" y="15" width="16" height="145" rx="3" fill="#34D399"/>
      <path d="M8 118 Q50 8 104 22" stroke="#34D399" stroke-width="3" fill="none" stroke-linecap="round"/>
    </g>

    <!-- Wordmark -->
    <text x="132" y="120" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="700" letter-spacing="-2" fill="#F8FAFC">
      Phase<tspan fill="#34D399">wise</tspan>
    </text>
  </g>

  <!-- Tagline -->
  <text x="80" y="310" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="400" letter-spacing="0.5" fill="#94A3B8">
    Phase-based project intelligence for design professionals
  </text>

  <!-- Accent line -->
  <rect x="80" y="330" width="120" height="3" rx="1.5" fill="#10B981"/>
</svg>
