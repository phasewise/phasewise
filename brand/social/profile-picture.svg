<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Social Media Profile Picture — 400x400 -->

  <!-- Background -->
  <rect width="400" height="400" rx="0" fill="#0F172A"/>

  <!-- Phase bars — centered -->
  <g transform="translate(68, 70)">
    <rect x="8" y="178" width="36" height="82" rx="6" fill="#34D399" opacity="0.4"/>
    <rect x="62" y="140" width="36" height="120" rx="6" fill="#34D399" opacity="0.55"/>
    <rect x="116" y="96" width="36" height="164" rx="6" fill="#34D399" opacity="0.7"/>
    <rect x="170" y="52" width="36" height="208" rx="6" fill="#34D399" opacity="0.85"/>
    <rect x="224" y="12" width="36" height="248" rx="6" fill="#34D399"/>

    <!-- Growth arc -->
    <path d="M26 196 Q130 6 242 28" stroke="#34D399" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Wordmark below -->
  <text x="200" y="358" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42" font-weight="700" letter-spacing="-1" fill="#F8FAFC">
    Phase<tspan fill="#34D399">wise</tspan>
  </text>
</svg>
